name: Pricing API CI

on:
  push:
    branches: [ main ]  # Runs every time you push to main
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      # We spin up a real Redis container in GitHub for integration testing
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx  # For testing

      - name: Run Unit Tests
        run: |
          pytest

      - name: Build Docker Image
        run: |
          docker build -t pricing-api-test .

      - name: Docker Smoke Test
        run: |
          docker run -d -p 8000:8000 --name test-api \
            -e REDIS_HOST=redis \
            pricing-api-test
          sleep 10
          docker ps | grep test-api