services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    volumes:
      - .:/app  # This is the most important line
    depends_on:
      - redis
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"